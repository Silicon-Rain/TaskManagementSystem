services:
  db:
    image: postgres:16-alpine
    container_name: task-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__PrimaryDb=Host=db;Port=5432;Database=TaskBusinessDb;Username=postgres;Password=1234
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started

  producer:
    build:
      context: .
      dockerfile: Producer/Dockerfile
    environment:
      - ConnectionStrings__PrimaryDb=Host=db;Port=5432;Database=TaskBusinessDb;Username=postgres;Password=1234
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Worker/Dockerfile
    environment:
      - ConnectionStrings__SecondaryDb=Host=db;Port=5432;Database=TaskWorkerDb;Username=postgres;Password=1234
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres_data: